<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="Styles.css">
    <title>Login</title>
       <a href="LoginPage.html"></a>
</head>
<body>
 <div>
    <center><h1>Registration Form</h1>
<!-- In-line css --

<!-- Internal css -->
<style>
    h1 {
        font-family: Arial, sans-serif;
        margin: 20px;
        color: rgb(0, 0, 0);
    }
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: antiquewhite;
    }
     form {
        font-family: Arial, sans-serif;
        margin: 20px;
        padding: 20px;
    }
    label {
        display: block;
        margin-bottom: 4px;
    }
    </style>

<div>
    <form action="LoginPage.html" method="get">
    <label for="UserName">Username: </label>
    <input type="text" id="username" name="username"><br><br>
    <label for="Password">Password:</label>
    <input type="password" id="password" name="password"><br><br>
    <label for="Email">Email:</label>
    <input type="Email" id="email" name="email"><br><br>
    <label for="Phone">Phone Number:</label>
    <input type="text" id="phone" name="phone"><br><br>
    <label for="Age">Age:</label>
    <input type="number" id="age" name="age"><br><br>
    <label for="Gender">Gender:<label for="Male">Male  <input type="radio" id="male" name="gender" value="male"></label>
    <label for="Female">Female <input type="radio" id="female" name="gender" value="female"></label>
    </label>
    <input type="submit"  id="register" value="Register">
</form>
</div>
</div>
</center>
</body>
</html>
