<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List</title>
  </head>
  <body>
    <h1>Unordered List</h1>
    <h3>Fruits List</h3>
    <ul>
      <li>Apple</li>
      <li>Grape</li>
      <li>Banana</li>
      <li>Orange</li>
      <li>Mango</li>
      <li>Kiwi</li>
    </ul>

    <ul type="circle">
      <li>Apple</li>
      <li>Grape</li>
      <li>Banana</li>
      <li>Orange</li>
      <li>Mango</li>
      <li>Kiwi</li>
    </ul>
  </body>
</html>
