<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        margin: 20px;
        padding: 20px;
        background-color: mediumturquoise;
    }
</style>
<body>
    <h1>DR.Reddys Courses</h1>
    <form action="website/index1.html" method="get">
        <body>
        <label >Course:</label><br>
        <input type="radio" id="mern" name="course" value="Mern stack">Mern stack<br><br>
        <input type="radio" id="java_dev" name="course" value="Java Developer">Java Developer<br><br>
        <input type="radio" id="python_dev" name="course" value="Python Developer">Python Developer<br><br>
        <input type="radio" id="react_dev" name="course" value="React Developer">React Developer<br><br>
        <input type="radio" id="data_sci" name="course" value="Data Science">Data Science<br><br>
        </body>
        <style></style><label>Domain:</label><br>
        <input type="checkbox" id="html" name="domain" value="html">Html<br><br>
        <input type="checkbox" id="css" name="domain" value="css">Css<br><br>
        <input type="checkbox" id="javascript" name="domain" value="javascript">javascript<br><br>
        <input type="checkbox" id="react" name="domain" value="react">react<br><br>
        <input type="checkbox" id="nodejs" name="domain" value="nodejs">nodejs<br><br>
        <input type="checkbox" id="express" name="domain" value="express">express<br><br>
        <input type="checkbox" id="mongodb" name="domain" value="mongodb">mongodb<br><br>
        <input type="checkbox" id="sql" name="domain" value="sql">sql<br><br>
        <input type="checkbox" id="python" name="domain" value="python">python<br><br>
        <input type="checkbox" id="java" name="domain" value="java">java<br><br>
        
        <label for="rating">How would you like us ?</label><br>
        <select id="rating" name="rating">
            <option value="">Select an option</option>
            <option value="Excellent">Excellent</option>
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>
            <option value="Poor">Poor</option>
        </select><br><br>
        
        <label for="suggestion">Suggestion:</label><br>
        <textarea id="suggestion" name="suggestion"></textarea><br><br>
        <input type="submit" value="Submit">
    
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }
     form {
        font-family: Arial, sans-serif;
        margin: 20px;
        padding: 20px;
    }
    label{
        display: block;
        margin-bottom: 4px;
        font-weight: bold;
    }
    </style>
    </form>
</body>
</html>
